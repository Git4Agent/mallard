name: Release Apple Silicon app

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: macOS Apple Silicon
    permissions:
      contents: write
    runs-on: macos-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run check:release-version -- "${{ github.ref_name }}"

      - name: Run frontend integration tests
        run: npm run test:frontend-integration

      - name: Test release configuration
        run: npm run test:release-config

      - name: Build and upload release draft
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MALLARD_VERIFY_MACOS_BUNDLE: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mallard ${{ github.ref_name }}"
          releaseBody: "Apple Silicon tester build. The app is ad-hoc signed and unnotarized, so macOS requires manual approval in Privacy & Security before first launch. Verify the attached DMG before publishing this draft."
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          args: >-
            --target aarch64-apple-darwin
            --bundles dmg
