name: Release desktop app

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run check:release-version -- "${{ github.ref_name }}"

      - name: Run frontend integration tests
        run: npm run test:frontend-integration

      - name: Test release scripts
        run: npm run test:release-scripts

      - name: Build and upload signed release
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mallard ${{ github.ref_name }}"
          releaseBody: "A signed Mallard update is ready. Review the attached installers and edit these notes before publishing."
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: >-
            --target ${{ matrix.target }}
            --bundles ${{ matrix.bundles }}

  publish-public-updater:
    name: Publish public updater files
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download private release assets
        run: gh release download "${{ github.ref_name }}" --dir release-assets

      - name: Prepare public updater manifest
        run: >-
          node scripts/prepare-updater-manifest.mjs
          release-assets/latest.json
          https://api.mallard-ai.com/v1/releases
          "${{ github.ref_name }}"

      - name: Verify Cloudflare publication credentials
        shell: bash
        run: |
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "CLOUDFLARE_API_TOKEN is required"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "CLOUDFLARE_ACCOUNT_ID is required"; exit 1; }

      - name: Upload immutable release assets to R2
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            npx --yes wrangler@4.112.0 r2 object put \
              "mallard-cloud-prod-demo/releases/${GITHUB_REF_NAME}/${filename}" \
              --file "$file" --remote --force
          done < <(find release-assets -maxdepth 1 -type f ! -name latest.json -print0)

          npx --yes wrangler@4.112.0 r2 object put \
            "mallard-cloud-prod-demo/releases/${GITHUB_REF_NAME}/latest.json" \
            --file release-assets/latest.json --remote --force
