name: Release desktop app

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.name }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            target: aarch64-apple-darwin
            bundles: app,dmg
          - name: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
            bundles: app,dmg
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        run: npm run check:release-version -- "${{ github.ref_name }}"

      - name: Run frontend integration tests
        run: npm run test:frontend-integration

      - name: Test release configuration
        run: npm run test:release-config

      - name: Build and upload release draft
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MALLARD_VERIFY_MACOS_BUNDLE: ${{ runner.os == 'macOS' && '1' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mallard ${{ github.ref_name }}"
          releaseBody: "A Mallard tester release is ready. The macOS installer uses valid ad-hoc signing and requires manual Gatekeeper approval. Review the attached installers and edit these notes before publishing."
          releaseDraft: true
          prerelease: false
          retryAttempts: 2
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          updaterJsonPreferNsis: true
          args: >-
            --target ${{ matrix.target }}
            --bundles ${{ matrix.bundles }}
